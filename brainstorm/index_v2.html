<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>BabyCare Visual Companion</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f0f23 0%,#1a1a3e 50%,#2d1b3d 100%);min-height:100vh;color:#e0e0e0;padding:20px}h1{text-align:center;font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#FF8C42,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:14px}.choices-panel{max-width:800px;margin:0 auto 20px;background:rgba(255,255,255,0.05);border-radius:16px;padding:16px;border:1px solid rgba(255,255,255,0.1)}.choices-panel h3{font-size:16px;color:#FF8C42;margin-bottom:8px}.choice-tags{display:flex;flex-wrap:wrap;gap:8px}.choice-tag{background:rgba(255,140,66,0.15);color:#FF8C42;padding:4px 12px;border-radius:20px;font-size:13px;border:1px solid rgba(255,140,66,0.3)}#contentFrame{border:none;width:100%;height:60vh;min-height:400px;border-radius:12px;background:#fff}.empty-state{text-align:center;padding:60px 20px;color:#666}.empty-state svg{opacity:0.3;margin-bottom:16px}.footer{text-align:center;margin-top:16px;color:#555;font-size:12px}</style></head><body><h1>BabyCare 视觉伴侣</h1><div class="choices-panel" id="choicesPanel"><h3>已选方案</h3><div class="choice-tags" id="choiceTags"></div></div><iframe id="contentFrame" src="about:blank"></iframe><div class="footer" id="status">等待内容推送…</div><script>const SESSION="default";let _lastKey=null;function poll(){fetch("/content/"+SESSION).then(r=>r.json()).then(d=>{if(d.content&&d.content.length>0){const latest=d.content[d.content.length-1];if(latest.key!==_lastKey){_lastKey=latest.key;document.getElementById("contentFrame").srcdoc=latest.html;document.getElementById("status").textContent="内容已加载 ("+new Date().toLocaleTimeString()+")";}}}).catch(e=>{document.getElementById("status").textContent="服务器未就绪";});setTimeout(poll,2000);}function pollChoices(){fetch("/state?session="+SESSION).then(r=>r.json()).then(d=>{const tags=document.getElementById("choiceTags");tags.innerHTML="";if(d.choices){Object.entries(d.choices).forEach(([k,v])=>{const tag=document.createElement("span");tag.className="choice-tag";tag.textContent=k+": "+v;tags.appendChild(tag);});}});setTimeout(pollChoices,3000);}window.addEventListener("message",e=>{if(e.data&&e.data.type==="choose"){fetch("/choose",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({session:SESSION,key:e.data.key,value:e.data.value})}).then(()=>document.getElementById("status").textContent="已选择: "+e.data.value);}});poll();pollChoices();</script></body></html>
